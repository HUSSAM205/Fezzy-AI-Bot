<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fezzy AI</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: rgba(15, 23, 42, 0.9);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .tagline {
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .new-chat {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 14px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .chat-card {
      width: 100%;
      max-width: 900px;
      height: 88vh;
      background: rgba(30, 41, 59, 0.88);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 0.6s ease;
    }

    .header {
      padding: 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header h1 {
      font-size: 38px;
      margin-bottom: 8px;
    }

    .header p {
      color: #cbd5e1;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: rgba(15, 23, 42, 0.55);
    }

    .msg {
      max-width: 75%;
      padding: 14px 16px;
      margin-bottom: 14px;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: slideUp 0.25s ease;
    }

    .user {
      margin-left: auto;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      margin-right: auto;
      background: #334155;
      color: #f8fafc;
      border-bottom-left-radius: 4px;
    }

    .composer {
      display: flex;
      gap: 12px;
      padding: 18px;
      background: rgba(15, 23, 42, 0.9);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    input {
      flex: 1;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      background: #0f172a;
      color: white;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #38bdf8;
    }

    button.send {
      padding: 0 24px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button.send:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 800px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .main {
        padding: 12px;
      }

      .chat-card {
        height: 75vh;
      }

      .msg {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Fezzy AI</div>
      <p class="tagline">
        A local AI chatbot powered by Ollama. Ask questions, get answers, and test your own private assistant.
      </p>
      <button class="new-chat" onclick="clearChat()">New Chat</button>
    </aside>

    <main class="main">
      <section class="chat-card">
        <div class="header">
          <h1>Chat with Fezzy AI</h1>
          <p>Fast, private, local AI assistant.</p>
        </div>

        <div id="chat">
          <div class="msg bot">Hi, I am Fezzy AI. Ask me anything.</div>
        </div>

        <div class="composer">
          <input id="message" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
          <button class="send" onclick="sendMessage()">Send</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message");

    function addMessage(text, who, typing = false) {
      const div = document.createElement("div");
      div.className = "msg " + who + (typing ? " typing" : "");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const thinking = addMessage("Thinking...", "bot", true);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({message: text})
        });

        const data = await res.json();
        thinking.classList.remove("typing");
        thinking.textContent = data.reply;
      } catch (error) {
        thinking.classList.remove("typing");
        thinking.textContent = "Error connecting to the server.";
      }

      chat.scrollTop = chat.scrollHeight;
    }

    function clearChat() {
      chat.innerHTML = '<div class="msg bot">New chat started. Ask me anything.</div>';
      input.focus();
    }
  </script>
</body>
</html>
