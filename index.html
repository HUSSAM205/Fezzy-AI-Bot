<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Welcome, {{ current_user.username }}!</h1>
        <a href="{{ url_for('logout') }}">Logout</a>

        <!-- Chat History -->
        <div id="chat-history" class="chat-history"></div>

        <!-- Message Input Form -->
        <form id="message-form">
            <input type="text" id="message-input" placeholder="Type a message...">
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        document.getElementById('message-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const message = document.getElementById('message-input').value;
            if (message.trim() !== '') {
                // Show user message immediately
                addMessageToChat(message, 'user');

                fetch('/chat/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                }).then(response => response.json())
                  .then(data => {
                      // Append bot reply to chat history
                      addMessageToChat(data.bot_message.text, 'bot');
                  });
            }
        });

        function addMessageToChat(text, type) {
            const chatHistory = document.getElementById('chat-history');
            const messageElement = document.createElement('div');
            messageElement.textContent = `${type === 'user' ? 'You:' : 'Bot:'} ${text}`;
            chatHistory.appendChild(messageElement);
        }

        // Fetch initial chat history
        fetch('/chat')
            .then(response => response.json())
            .then(data => {
                data.forEach(message => {
                    addMessageToChat(message.text, message.username === current_user.username ? 'user' : 'bot');
                });
            });
    </script>
</body>
</html>
